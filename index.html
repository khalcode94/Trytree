<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafe3 Store | نافع ستور</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #030305;
            background-image: url('469171.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #ffffff;
            overflow-x: hidden;
            perspective: 1000px;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(3, 3, 5, 0.85) 0%, rgba(1, 1, 2, 0.98) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 60px 20px;
            text-align: center;
        }

        .profile-header {
            margin-bottom: 50px;
            animation: cinematicSpawn 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .store-name {
            font-size: 3rem;
            color: #a3e635; 
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(163, 230, 53, 0.4);
        }

        .store-bio {
            font-size: 0.95rem;
            color: #64748b;
            font-family: 'Fira Code', monospace;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* حاوية الزر السحرية لعمل الإطار الدوار */
        .card-wrapper {
            position: relative;
            border-radius: 20px;
            padding: 2px; /* مسافة لظهور الإطار النيون */
            overflow: hidden;
            background: rgba(255, 255, 255, 0.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            opacity: 0;
            transform: scale(0.9) rotateX(-15deg);
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* الإطار النيون الذي يلف حول الزر باستمرار */
        .card-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, var(--glow-color, #a3e635), transparent 30%);
            animation: rotateBorder 4s linear infinite;
            z-index: 1;
        }

        /* كود خلفية الأكواد المتحركة داخل البطاقة */
        .code-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: var(--glow-color, #a3e635);
            opacity: 0.12; /* شفافة لكي لا تؤثر على وضوح النص الأصلي */
            overflow: hidden;
            white-space: nowrap;
            pointer-events: none;
            direction: ltr;
            text-align: left;
            padding: 5px;
            z-index: 2;
        }

        /* محتوى الزر الفعلي فوق الأكواد والإطار */
        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            padding: 18px 24px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            background: #09090e; /* لون داكن قوي لعزل الخلفية */
            width: 100%;
            height: 100%;
            z-index: 3;
            transition: background 0.3s, transform 0.1s ease;
            transform-style: preserve-3d;
        }

        .link-btn:hover {
            background: #11111a;
        }

        /* دفع الأيقونة والنصوص للأمام لتأثير 3D */
        .icon, .btn-img, .btn-text {
            transform: translateZ(40px);
        }

        .icon {
            font-size: 1.6rem;
            margin-left: 20px;
            width: 32px;
            text-align: center;
            text-shadow: 0 0 10px currentColor;
        }

        .btn-img {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            margin-left: 20px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: right;
            flex-grow: 1;
        }

        .btn-text .title {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .btn-text .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* متغيرات الألوان النيون للأزرار */
        .wrapper-purple { --glow-color: #c084fc; color: #c084fc; }
        .wrapper-blue   { --glow-color: #60a5fa; color: #60a5fa; }
        .wrapper-green  { --glow-color: #a3e635; color: #a3e635; }
        .wrapper-dark   { --glow-color: #64748b; color: #e2e8f0; }

        /* تفتيح النص الفرعي عند اللمس */
        .link-btn:hover .subtitle { color: #cbd5e1; }

        /* الأنيميشن */
        @keyframes rotateBorder {
            100% { transform: rotate(360deg); }
        }

        @keyframes cinematicSpawn {
            from { opacity: 0; filter: blur(15px); transform: translateY(-30px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: scale(1) rotateX(0); }
        }

        .loading {
            color: #a3e635;
            font-size: 1.2rem;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <header class="profile-header">
            <h1 class="store-name">نافع ستور</h1>
            <p class="store-bio">// SECURE_CONNECTION_INITIALIZED</p>
        </header>

        <main class="links-list" id="links-container">
            <div class="loading"><i class="fa-solid fa-terminal fa-bounce"></i> جاري فك تشفير البيانات وضخ الأكواد...</div>
        </main>
    </div>

    <script>
        const SPREADSHEET_ID = '1z1iYsSmwvCmUIGBoF8Wo9ZbmOafXebIa3krxa7wn0eM'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        // دالة مصفوفة الأكواد العشوائية المتحركة داخل كل زر
        function startCodeStream(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            const chars = "01010101ABCDEFGHIJKLMNOPQRSTUVWXYZ<>[]{}?/!@#$%^&*+=-_";
            
            setInterval(() => {
                let stream = "";
                for(let i = 0; i < 4; i++) { // توليد 4 أسطر من الأكواد المتحركة
                    let line = "";
                    for(let j = 0; j < 35; j++) {
                        line += chars[Math.floor(Math.random() * chars.length)];
                    }
                    stream += line + "<br>";
                }
                el.innerHTML = stream;
            }, 120); // سرعة تغيير الأكواد بالملي ثانية
        }

        async function fetchLinks() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                const container = document.getElementById('links-container');
                container.innerHTML = ''; 

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                let delay = 0; 

                rows.forEach((row, index) => {
                    const title = row.c[0] ? row.c[0].v : '';
                    const subtitle = row.c[1] ? row.c[1].v : '';
                    const linkUrl = row.c[2] ? row.c[2].v : '#';
                    const colorClass = row.c[3] ? row.c[3].v : 'purple';
                    const iconName = row.c[4] ? row.c[4].v : 'fa-link';
                    const startDateStr = row.c[5] ? row.c[5].v : null;
                    const endDateStr = row.c[6] ? row.c[6].v : null;
                    const imageUrl = row.c[7] ? row.c[7].v : null;

                    let shouldShow = true;

                    if (startDateStr) {
                        const startDate = new Date(startDateStr);
                        startDate.setHours(0, 0, 0, 0);
                        if (today < startDate) shouldShow = false;
                    }

                    if (endDateStr) {
                        const endDate = new Date(endDateStr);
                        endDate.setHours(0, 0, 0, 0);
                        if (today > endDate) shouldShow = false;
                    }

                    if (shouldShow && title) {
                        delay += 0.12; 
                        const streamId = `stream-${index}`;
                        
                        const mediaHTML = imageUrl 
                            ? `<img src="${imageUrl}" class="btn-img" alt="${title}">` 
                            : `<i class="fa-solid ${iconName} icon"></i>`;

                        // تغليف الزر بداخل كبسولة الـ card-wrapper لتوليد حركة الإطار النيون والأكواد الخلفية
                        const cardHTML = `
                            <div class="card-wrapper wrapper-${colorClass}" style="animation-delay: ${delay}s">
                                <div class="code-bg" id="${streamId}"></div>
                                <a href="${linkUrl}" class="link-btn">
                                    ${mediaHTML}
                                    <div class="btn-text">
                                        <span class="title">${title}</span>
                                        ${subtitle ? `<span class="subtitle">${subtitle}</span>` : ''}
                                    </div>
                                </a>
                            </div>
                        `;
                        container.innerHTML += cardHTML;
                        
                        // بدء تشغيل سيل الأكواد التلقائي لهذا الزر فوراً بعد بنائه
                        setTimeout(() => startCodeStream(streamId), 50);
                    }
                });

                add3DTiltEffect();

            } catch (error) {
                console.error(error);
                document.getElementById('links-container').innerHTML = '<div class="loading">ERROR_CONNECTION_FAILED</div>';
            }
        }

        function add3DTiltEffect() {
            const wrappers = document.querySelectorAll('.card-wrapper');
            wrappers.forEach(wrapper => {
                const card = wrapper.querySelector('.link-btn');
                wrapper.addEventListener('mousemove', (e) => {
                    const rect = wrapper.getBoundingClientRect();
                    const x = e.clientX - rect.left - (rect.width/2);
                    const y = e.clientY - rect.top - (rect.height/2);
                    
                    const angleX = -(y / (rect.height/2)) * 15;
                    const angleY = (x / (rect.width/2)) * 15;
                    
                    wrapper.style.transform = `rotateX(${angleX}deg) rotateY(${angleY}deg) scale(1.03)`;
                });
                
                wrapper.addEventListener('mouseleave', () => {
                    wrapper.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
                });
            });
        }

        fetchLinks();
    </script>
</body>
</html>
