<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafe3 Store | نافع ستور</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- تصميم تفاعلي غامض ومبهر لـ نافع ستور --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #050508;
            background-image: url('469171.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #ffffff;
            overflow-x: hidden;
            perspective: 1000px; /* لتمكين التأثيرات ثلاثية الأبعاد */
        }

        /* طبقة حماية وخلفية متحركة */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(10, 10, 15, 0.8) 0%, rgba(5, 5, 8, 0.95) 100%);
            z-index: 1;
        }

        /* جزيئات طافية في الخلفية كاللغز */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: rgba(163, 230, 53, 0.1);
            border-radius: 50%;
            animation: floatAround 12s infinite linear;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 60px 20px;
            text-align: center;
        }

        /* أنيميشن الهيدر السحري */
        .profile-header {
            margin-bottom: 50px;
            animation: cinematicSpawn 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .store-name {
            font-size: 3rem;
            color: #a3e635; 
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(163, 230, 53, 0.4), 0 0 40px rgba(163, 230, 53, 0.2);
            letter-spacing: -1px;
        }

        .store-bio {
            font-size: 0.95rem;
            color: #8e9196;
            letter-spacing: 1px;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        /* بطاقات الروابط السحرية ثلاثية الأبعاد */
        .link-btn {
            display: flex;
            align-items: center;
            padding: 18px 26px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            transform: translateZ(0) scale(0.9) rotateX(-20deg);
            opacity: 0;
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.1s ease;
        }

        /* عند تمرير الماوس أو اللمس القوي */
        .link-btn:hover {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.07);
        }

        /* دفع النص والأيقونة للأمام بـ 3D */
        .icon, .btn-img, .btn-text {
            transform: translateZ(30px); /* يخرج العنصر للأمام كأنه مجسم */
        }

        .icon {
            font-size: 1.6rem;
            margin-left: 20px;
            width: 32px;
            text-align: center;
            text-shadow: 0 0 10px currentColor;
        }

        .btn-img {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            margin-left: 20px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: right;
            flex-grow: 1;
        }

        .btn-text .title {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .btn-text .subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* ألوان وهالات الأزرار المضيئة */
        .btn-purple { color: #c084fc; box-shadow: 0 4px 20px rgba(147, 51, 234, 0.15); }
        .btn-purple:hover { box-shadow: 0 15px 35px rgba(147, 51, 234, 0.4); border-color: #c084fc; }

        .btn-blue { color: #60a5fa; box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15); }
        .btn-blue:hover { box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4); border-color: #60a5fa; }

        .btn-green { color: #a3e635; box-shadow: 0 4px 20px rgba(101, 163, 13, 0.15); }
        .btn-green:hover { box-shadow: 0 15px 35px rgba(163, 230, 53, 0.4); border-color: #a3e635; }

        .btn-dark { color: #e2e8f0; box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05); }
        .btn-dark:hover { box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2); border-color: #ffffff; }

        /* الأنيميشنز */
        @keyframes cinematicSpawn {
            from { opacity: 0; filter: blur(15px); transform: translateY(-40px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: translateZ(0) scale(1) rotateX(0); }
        }

        @keyframes floatAround {
            0% { transform: translateY(100vh) translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(50px) scale(1.2); opacity: 0; }
        }

        .loading {
            color: #a3e635;
            font-size: 1.2rem;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>
    
    <div class="particles" id="particles-container"></div>

    <div class="container">
        <header class="profile-header">
            <h1 class="store-name">نافع ستور</h1>
            <p class="store-bio">Nafe3.Store For Mobile & Internet Services</p>
        </header>

        <main class="links-list" id="links-container">
            <div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري استدعاء العروض المشفرة...</div>
        </main>
    </div>

    <script>
        const SPREADSHEET_ID = '1z1iYsSmwvCmUIGBoF8Wo9ZbmOafXebIa3krxa7wn0eM'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        // 1. توليد تأثير الجزيئات الطافية في الخلفية تلقائياً
        function createParticles() {
            const pContainer = document.getElementById('particles-container');
            for(let i=0; i<15; i++) {
                let particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.width = particle.style.height = Math.random() * 8 + 4 + 'px';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = Math.random() * 8 + 8 + 's';
                pContainer.appendChild(particle);
            }
        }
        createParticles();

        async function fetchLinks() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                const container = document.getElementById('links-container');
                container.innerHTML = ''; 

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                let delay = 0; 

                rows.forEach(row => {
                    const title = row.c[0] ? row.c[0].v : '';
                    const subtitle = row.c[1] ? row.c[1].v : '';
                    const linkUrl = row.c[2] ? row.c[2].v : '#';
                    const colorClass = row.c[3] ? row.c[3].v : 'purple';
                    const iconName = row.c[4] ? row.c[4].v : 'fa-link';
                    const startDateStr = row.c[5] ? row.c[5].v : null;
                    const endDateStr = row.c[6] ? row.c[6].v : null;
                    const imageUrl = row.c[7] ? row.c[7].v : null;

                    let shouldShow = true;

                    if (startDateStr) {
                        const startDate = new Date(startDateStr);
                        startDate.setHours(0, 0, 0, 0);
                        if (today < startDate) shouldShow = false;
                    }

                    if (endDateStr) {
                        const endDate = new Date(endDateStr);
                        endDate.setHours(0, 0, 0, 0);
                        if (today > endDate) shouldShow = false;
                    }

                    if (shouldShow && title) {
                        delay += 0.12; 
                        
                        const mediaHTML = imageUrl 
                            ? `<img src="${imageUrl}" class="btn-img" alt="${title}">` 
                            : `<i class="fa-solid ${iconName} icon"></i>`;

                        const btnHTML = `
                            <a href="${linkUrl}" class="link-btn btn-${colorClass}" target="_blank" style="animation-delay: ${delay}s">
                                ${mediaHTML}
                                <div class="btn-text">
                                    <span class="title">${title}</span>
                                    ${subtitle ? `<span class="subtitle">${subtitle}</span>` : ''}
                                </div>
                            </a>
                        `;
                        container.innerHTML += btnHTML;
                    }
                });

                // 2. تفعيل تأثير الميلان ثلاثي الأبعاد الذكي (3D Tilt Effect) لكل الأزرار بعد توليدها
                add3DTiltEffect();

            } catch (error) {
                console.error(error);
                document.getElementById('links-container').innerHTML = '<div class="loading">خطأ في الاتصال بالخادم الرئيسي.</div>';
            }
        }

        function add3DTiltEffect() {
            const cards = document.querySelectorAll('.link-btn');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left - (rect.width/2);
                    const y = e.clientY - rect.top - (rect.height/2);
                    
                    // حساب زوايا الميلان بناءً على موقع الإصبع/الماوس
                    const angleX = -(y / (rect.height/2)) * 15;
                    const angleY = (x / (rect.width/2)) * 15;
                    
                    card.style.transform = `rotateX(${angleX}deg) rotateY(${angleY}deg) scale(1.03)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
                });
            });
        }

        fetchLinks();
    </script>
</body>
</html>
