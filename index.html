<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafe3 Store | نافع ستور</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fira+Code:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #030305;
            background-image: url('469171.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #ffffff;
            overflow-x: hidden;
            perspective: 1000px;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(3, 3, 5, 0.85) 0%, rgba(1, 1, 2, 0.98) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 60px 20px;
            text-align: center;
        }

        /* حاوية رأس الصفحة السحرية لتعبان الأكواد */
        .profile-header {
            position: relative;
            margin-bottom: 50px;
            padding: 30px 10px;
            animation: cinematicSpawn 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* ساحة حركة ثعبان الأرقام حول الاسم */
        .snake-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .snake-segment {
            position: absolute;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #a3e635;
            text-shadow: 0 0 8px #a3e635, 0 0 15px #a3e635;
            opacity: 0;
            transition: all 0.05s linear;
        }

        .store-name {
            position: relative;
            z-index: 2;
            font-size: 3rem;
            color: #ffffff; 
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .store-bio {
            position: relative;
            z-index: 2;
            font-size: 0.95rem;
            color: #64748b;
            font-family: 'Fira Code', monospace;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card-wrapper {
            position: relative;
            border-radius: 20px;
            padding: 2px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            opacity: 0;
            transform: scale(0.9) rotateX(-15deg);
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .card-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, var(--glow-color, #a3e635), transparent 30%);
            animation: rotateBorder 4s linear infinite;
            z-index: 1;
        }

        .code-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: var(--glow-color, #a3e635);
            opacity: 0.12;
            overflow: hidden;
            white-space: nowrap;
            pointer-events: none;
            direction: ltr;
            text-align: left;
            padding: 5px;
            z-index: 2;
        }

        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            padding: 18px 24px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            background: #09090e;
            width: 100%;
            height: 100%;
            z-index: 3;
            transition: background 0.3s;
            transform-style: preserve-3d;
        }

        .link-btn:hover { background: #11111a; }
        .icon, .btn-img, .btn-text { transform: translateZ(40px); }

        .icon {
            font-size: 1.6rem;
            margin-left: 20px;
            width: 32px;
            text-align: center;
            text-shadow: 0 0 10px currentColor;
        }

        .btn-img {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            margin-left: 20px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: right;
            flex-grow: 1;
        }

        .btn-text .title { font-size: 1.15rem; font-weight: 700; }
        .btn-text .subtitle { font-size: 0.85rem; color: #64748b; margin-top: 4px; }

        /* متغيرات الألوان النيون للأزرار */
        .wrapper-purple { --glow-color: #c084fc; color: #c084fc; }
        .wrapper-blue   { --glow-color: #60a5fa; color: #60a5fa; }
        .wrapper-green  { --glow-color: #a3e635; color: #a3e635; }
        .wrapper-dark   { --glow-color: #64748b; color: #e2e8f0; }

        .link-btn:hover .subtitle { color: #cbd5e1; }

        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }
        @keyframes cardEntrance { to { opacity: 1; transform: scale(1) rotateX(0); } }
        @keyframes cinematicSpawn {
            from { opacity: 0; filter: blur(15px); transform: translateY(-30px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        .loading { color: #a3e635; font-size: 1.2rem; padding: 50px; }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <header class="profile-header" id="main-header">
            <div class="snake-container" id="snake-pit"></div>
            <h1 class="store-name" id="dynamic-store-name">جاري التشفير...</h1>
            <p class="store-bio" id="dynamic-store-bio">// LINKING_DATA_STREAM</p>
        </header>

        <main class="links-list" id="links-container">
            <div class="loading"><i class="fa-solid fa-terminal fa-bounce"></i> جاري استدعاء مصفوفة الألغاز...</div>
        </main>
    </div>

    <script>
        const SPREADSHEET_ID = '1z1iYsSmwvCmUIGBoF8Wo9ZbmOafXebIa3krxa7wn0eM'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        // دالة حركة ثعبان الأكواد الرقمية المتوهجة
        function initCodeSnake() {
            const pit = document.getElementById('snake-pit');
            const snakeLength = 14; 
            const segments = [];
            const chars = "01010101XYZ<>[]#$@*";

            for (let i = 0; i < snakeLength; i++) {
                const seg = document.createElement('div');
                seg.className = 'snake-segment';
                seg.style.opacity = (1 - (i / snakeLength)).toString();
                if(i === 0) seg.style.color = '#ffffff'; 
                pit.appendChild(seg);
                segments.push(seg);
            }

            let angle = 0;
            setInterval(() => {
                angle += 0.04; 
                
                const radiusX = pit.offsetWidth / 2 - 10;
                const radiusY = pit.offsetHeight / 2 - 5;
                const centerX = pit.offsetWidth / 2;
                const centerY = pit.offsetHeight / 2;

                for (let i = snakeLength - 1; i > 0; i--) {
                    segments[i].style.left = segments[i-1].style.left;
                    segments[i].style.top = segments[i-1].style.top;
                    segments[i].innerHTML = segments[i-1].innerHTML;
                }

                const headX = centerX + radiusX * Math.cos(angle) - 5;
                const headY = centerY + radiusY * Math.sin(angle) - 10;
                
                segments[0].style.left = headX + 'px';
                segments[0].style.top = headY + 'px';
                segments[0].innerHTML = chars[Math.floor(Math.random() * chars.length)];
            }, 40); 
        }

        function startCodeStream(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            const chars = "01010101ABCDEFGHIJKLMNOPQRSTUVWXYZ<>[]{}?/!@#$%^&*+=-_";
            setInterval(() => {
                let stream = "";
                for(let i = 0; i < 4; i++) {
                    let line = "";
                    for(let j = 0; j < 35; j++) { line += chars[Math.floor(Math.random() * chars.length)]; }
                    stream += line + "<br>";
                }
                el.innerHTML = stream;
            }, 120);
        }

        async function fetchLinks() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                const container = document.getElementById('links-container');
                container.innerHTML = ''; 

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // --- 🛠️ استخراج اسم ووصف المحل من العمود I (حرف الـ I ترتيبه 8 في المصفوفة) ---
                let sheetStoreName = 'نافع ستور';
                let sheetStoreBio = '// CONNECTION_SECURE';

                // الخلية I2 (الصف الثاني في الشيت، أي الموضع 0 في البيانات بعد صف الهيدر)
                if (rows[0] && rows[0].c[8] && rows[0].c[8].v) {
                    sheetStoreName = rows[0].c[8].v;
                }
                // الخلية I3 (الصف الثالث في الشيت، أي الموضع 1)
                if (rows[1] && rows[1].c[8] && rows[1].c[8].v) {
                    sheetStoreBio = rows[1].c[8].v;
                }

                document.getElementById('dynamic-store-name').innerText = sheetStoreName;
                document.getElementById('dynamic-store-bio').innerText = sheetStoreBio;

                let delay = 0; 

                // قراءة كل الأزرار والخدمات بشكل طبيعي
                rows.forEach((row, index) => {
                    const title = row.c[0] ? row.c[0].v : '';
                    const subtitle = row.c[1] ? row.c[1].v : '';
                    const linkUrl = row.c[2] ? row.c[2].v : '#';
                    const colorClass = row.c[3] ? row.c[3].v : 'purple';
                    const iconName = row.c[4] ? row.c[4].v : 'fa-link';
                    const startDateStr = row.c[5] ? row.c[5].v : null;
                    const endDateStr = row.c[6] ? row.c[6].v : null;
                    const imageUrl = row.c[7] ? row.c[7].v : null;

                    let shouldShow = true;

                    if (startDateStr) {
                        const startDate = new Date(startDateStr);
                        startDate.setHours(0, 0, 0, 0);
                        if (today < startDate) shouldShow = false;
                    }

                    if (endDateStr) {
                        const endDate = new Date(endDateStr);
                        endDate.setHours(0, 0, 0, 0);
                        if (today > endDate) shouldShow = false;
                    }

                    if (shouldShow && title) {
                        delay += 0.12; 
                        const streamId = `stream-${index}`;
                        
                        const mediaHTML = imageUrl 
                            ? `<img src="${imageUrl}" class="btn-img" alt="${title}">` 
                            : `<i class="fa-solid ${iconName} icon"></i>`;

                        const cardHTML = `
                            <div class="card-wrapper wrapper-${colorClass}" style="animation-delay: ${delay}s">
                                <div class="code-bg" id="${streamId}"></div>
                                <a href="${linkUrl}" class="link-btn">
                                    ${mediaHTML}
                                    <div class="btn-text">
                                        <span class="title">${title}</span>
                                        ${subtitle ? `<span class="subtitle">${subtitle}</span>` : ''}
                                    </div>
                                </a>
                            </div>
                        `;
                        container.innerHTML += cardHTML;
                        
                        setTimeout(() => startCodeStream(streamId), 50);
                    }
                });

                if (container.innerHTML === '') {
                    container.innerHTML = '<div class="error-msg">تابعونا قريباً لمعرفة أحدث خدماتنا وعروضنا الحصرية!</div>';
                }

                add3DTiltEffect();
                initCodeSnake(); // تشغيل الأرقام الطائرة حول العنوان الرئيسي للمتجر

            } catch (error) {
                console.error(error);
                document.getElementById('links-container').innerHTML = '<div class="loading">ERROR_CONNECTION_FAILED</div>';
            }
        }

        function add3DTiltEffect() {
            const wrappers = document.querySelectorAll('.card-wrapper');
            wrappers.forEach(wrapper => {
                wrapper.addEventListener('mousemove', (e) => {
                    const rect = wrapper.getBoundingClientRect();
                    const x = e.clientX - rect.left - (rect.width/2);
                    const y = e.clientY - rect.top - (rect.height/2);
                    
                    const angleX = -(y / (rect.height/2)) * 15;
                    const angleY = (x / (rect.width/2)) * 15;
                    
                    wrapper.style.transform = `rotateX(${angleX}deg) rotateY(${angleY}deg) scale(1.03)`;
                });
                
                wrapper.addEventListener('mouseleave', () => {
                    wrapper.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
                });
            });
        }

        fetchLinks();
    </script>
</body>
</html>
