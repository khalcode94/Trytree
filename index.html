<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafe3 Store | نافع ستور</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- واجهة مستخدم فخمة ومطورة لـ نافع ستور --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #060608;
            background-image: url('469171.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* تأثير الخلفية الحية المتحركة في العمق */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(6, 6, 8, 0.85), rgba(15, 12, 22, 0.8));
            z-index: 1;
        }

        /* وهج ضوئي في الخلفية متحرك يعطي لمسة جمالية */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(163, 230, 53, 0.04) 0%, rgba(109, 40, 217, 0.03) 50%, transparent 100%);
            z-index: 1;
            animation: drift 20s linear infinite;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 60px 24px;
            text-align: center;
        }

        /* أنيميشن رأس الصفحة */
        .profile-header {
            margin-bottom: 45px;
            animation: blurIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .store-name {
            font-size: 2.8rem;
            color: #a3e635; 
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 0 0 30px rgba(163, 230, 53, 0.3);
        }

        .store-bio {
            font-size: 0.95rem;
            color: #a1a1aa;
            font-weight: 400;
            opacity: 0.9;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* تصميم الأزرار الزجاجية الفاخرة */
        .link-btn {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-radius: 24px; /* زوايا انسيابية حديثة وليست دائرية حادة */
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0; 
            transform: translateY(25px);
            animation: slideUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* تأثيرات الـ Hover الاحترافية بالتوهج */
        .link-btn:hover {
            transform: translateY(-5px) scale(1.015);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* حركة تفاعلية ميكروية للأيقونات والصور */
        .icon {
            font-size: 1.4rem;
            margin-left: 18px;
            width: 28px;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .link-btn:hover .icon {
            transform: scale(1.2) rotate(-8deg);
        }

        .btn-img {
            width: 44px;
            height: 44px;
            border-radius: 16px; /* متناسقة مع زوايا الزر */
            margin-left: 18px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .link-btn:hover .btn-img {
            transform: scale(1.1) rotate(5deg);
            border-color: #a3e635;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: right;
            flex-grow: 1;
        }

        .btn-text .title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .btn-text .subtitle {
            font-size: 0.82rem;
            color: #94a3b8;
            margin-top: 3px;
            transition: color 0.3s ease;
        }

        .link-btn:hover .btn-text .subtitle {
            color: rgba(255, 255, 255, 0.9);
        }

        /* تدرجات ألوان الوهج والخلفيات عند اللمس */
        .btn-purple:hover { box-shadow: 0 12px 30px rgba(139, 92, 246, 0.25); border-color: rgba(139, 92, 246, 0.4); }
        .btn-purple .icon { color: #a78bfa; }

        .btn-blue:hover { box-shadow: 0 12px 30px rgba(59, 130, 246, 0.25); border-color: rgba(59, 130, 246, 0.4); }
        .btn-blue .icon { color: #60a5fa; }

        .btn-green:hover { box-shadow: 0 12px 30px rgba(163, 230, 53, 0.2); border-color: rgba(163, 230, 53, 0.4); }
        .btn-green .icon { color: #a3e635; }

        .btn-dark:hover { box-shadow: 0 12px 30px rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.3); }
        .btn-dark .icon { color: #e2e8f0; }

        /* الأنيميشن اللطيف للتحميل والخطأ */
        .loading {
            color: #a3e635;
            font-size: 1.1rem;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .error-msg {
            color: #f87171;
            font-size: 1rem;
            padding: 30px;
            background: rgba(248, 113, 113, 0.05);
            border: 1px solid rgba(248, 113, 113, 0.1);
            border-radius: 20px;
        }

        /* تعريف حركات الـ CSS */
        @keyframes blurIn {
            from { opacity: 0; filter: blur(10px); transform: scale(0.95); }
            to { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        @keyframes slideUpIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes drift {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <header class="profile-header">
            <h1 class="store-name">نافع ستور</h1>
            <p class="store-bio">Nafe3.Store For Mobile & Internet Services</p>
        </header>

        <main class="links-list" id="links-container">
            <div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> جاري تحميل الخدمات الفاخرة...</div>
        </main>
    </div>

    <script>
        // معرّف الجدول الخاص بك سليم ومحفوظ
        const SPREADSHEET_ID = '1z1iYsSmwvCmUIGBoF8Wo9ZbmOafXebIa3krxa7wn0eM'; 
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        async function fetchLinks() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                const container = document.getElementById('links-container');
                container.innerHTML = ''; 

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                let delay = 0; 

                rows.forEach(row => {
                    const title = row.c[0] ? row.c[0].v : '';
                    const subtitle = row.c[1] ? row.c[1].v : '';
                    const linkUrl = row.c[2] ? row.c[2].v : '#';
                    const colorClass = row.c[3] ? row.c[3].v : 'purple';
                    const iconName = row.c[4] ? row.c[4].v : 'fa-link';
                    const startDateStr = row.c[5] ? row.c[5].v : null;
                    const endDateStr = row.c[6] ? row.c[6].v : null;
                    const imageUrl = row.c[7] ? row.c[7].v : null;

                    let shouldShow = true;

                    if (startDateStr) {
                        const startDate = new Date(startDateStr);
                        startDate.setHours(0, 0, 0, 0);
                        if (today < startDate) shouldShow = false;
                    }

                    if (endDateStr) {
                        const endDate = new Date(endDateStr);
                        endDate.setHours(0, 0, 0, 0);
                        if (today > endDate) shouldShow = false;
                    }

                    if (shouldShow && title) {
                        delay += 0.1; // سرعة تتابع مثالية ومريحة للعين
                        
                        const mediaHTML = imageUrl 
                            ? `<img src="${imageUrl}" class="btn-img" alt="${title}">` 
                            : `<i class="fa-solid ${iconName} icon"></i>`;

                        const btnHTML = `
                            <a href="${linkUrl}" class="link-btn btn-${colorClass}" target="_blank" style="animation-delay: ${delay}s">
                                ${mediaHTML}
                                <div class="btn-text">
                                    <span class="title">${title}</span>
                                    ${subtitle ? `<span class="subtitle">${subtitle}</span>` : ''}
                                </div>
                            </a>
                        `;
                        container.innerHTML += btnHTML;
                    }
                });

                if (container.innerHTML === '') {
                    container.innerHTML = '<div class="error-msg">تابعونا قريباً لمعرفة أحدث خدماتنا وعروضنا الحصرية!</div>';
                }

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('links-container').innerHTML = '<div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> عذراً، تعذر تحديث الخدمات حالياً.</div>';
            }
        }

        fetchLinks();
    </script>
</body>
</html>
